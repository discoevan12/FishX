<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Listing — FishX</title>
  <link rel="stylesheet" href="css/global.css"/>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
</head>
<body>
<nav class="topnav">
  <a class="nav-logo" href="index.html">
    <img src="assets/logo.png" alt="FishX"/>
    <span class="nav-logo-text">FISH<span>X</span></span>
  </a>
  <div class="nav-links">
    <a class="nav-link" href="market.html">Market</a>
    <a class="nav-link" href="sell.html">Sell</a>
    <a class="nav-link" href="messages.html">Messages</a>
  </div>
  <div class="nav-right">
    <a href="profile.html" style="display:flex;align-items:center;gap:8px;text-decoration:none;">
      <img class="nav-avatar" id="navAvatar" src="" alt="avatar" style="display:none;"/>
      <span class="nav-username" id="navUsername"></span>
    </a>
    <button class="btn btn-ghost btn-sm" onclick="signOut()">Sign Out</button>
  </div>
</nav>

<div class="page-wrap">
  <div class="container" style="max-width:960px;">
    <div style="margin-bottom:20px;">
      <a href="market.html" style="color:var(--text-dim);font-size:0.85rem;display:inline-flex;align-items:center;gap:6px;">&#8592; Back to Market</a>
    </div>
    <div id="listingContent">
      <div style="display:flex;align-items:center;justify-content:center;min-height:300px;">
        <div class="spinner"></div>
      </div>
    </div>
  </div>
</div>

<!-- Bid Modal -->
<div class="modal-overlay hidden" id="bidModal">
  <div class="modal-box">
    <h3 class="modal-title">Place a Bid</h3>
    <p class="modal-sub" id="bidModalSub">—</p>
    <p style="margin-bottom:16px;font-size:0.9rem;">Current bid: <strong id="bidModalCurrent" style="color:var(--green);font-family:monospace;">—</strong></p>
    <div class="form-group">
      <label class="form-label">Your Bid (USD)</label>
      <input class="form-input" id="bidInput" type="number" min="0" step="0.01" placeholder="Enter amount…"/>
    </div>
    <div id="buyoutRow" style="display:none;margin-bottom:16px;padding:12px;background:var(--gray-800);border-radius:var(--r-md);border:1px solid rgba(245,158,11,0.3);">
      <p style="font-size:0.85rem;color:var(--gold);margin-bottom:8px;">Buyout available: <strong id="buyoutAmountDisplay">—</strong></p>
      <button class="btn btn-sm" id="buyoutConfirmBtn" style="border:1px solid var(--gold);color:var(--gold);background:transparent;">Buy Out Now</button>
    </div>
    <div style="display:flex;gap:10px;margin-top:8px;">
      <button class="btn btn-ghost" id="bidCancel" style="flex:1;">Cancel</button>
      <button class="btn btn-primary" id="bidConfirm" style="flex:2;">Confirm Bid</button>
    </div>
  </div>
</div>

<div id="toastContainer"></div>
<style>
.listing-hero { display:grid; grid-template-columns:1fr 1fr; gap:40px; margin-bottom:40px; }
@media(max-width:700px) { .listing-hero { grid-template-columns:1fr; } }
.listing-img-wrap { border-radius:var(--r-xl); overflow:hidden; background:var(--gray-800); aspect-ratio:4/3; display:flex;align-items:center;justify-content:center; }
.listing-img-wrap img { width:100%;height:100%;object-fit:cover; }
.listing-img-placeholder { font-size:6rem; }
.listing-info { display:flex;flex-direction:column;gap:16px; }
.listing-title { font-family:var(--font-display);font-size:2.2rem;font-weight:900;line-height:1.1; }
.listing-seller { display:flex;align-items:center;gap:10px;padding:12px;background:var(--gray-800);border-radius:var(--r-md); }
.listing-seller img { width:36px;height:36px;border-radius:50%;object-fit:cover;border:2px solid var(--border-blue); }
.price-box { padding:20px;background:var(--gray-800);border:1px solid var(--border);border-radius:var(--r-lg); }
.bid-history { margin-top:32px; }
.bid-entry { display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border); }
</style>
<script src="js/shared.js"></script>
<script>
  const params = new URLSearchParams(location.search);
  const KEY    = params.get("key");
  let item     = null;

  requireAuth(initListing);

  function initListing(user) {
    if (!KEY) { document.getElementById("listingContent").innerHTML = `<p class="text-dim" style="text-align:center;padding:60px;">Listing not found.</p>`; return; }

    db.ref(`listings/${KEY}`).on("value", snap => {
      item = snap.val();
      if (!item) { document.getElementById("listingContent").innerHTML = `<p class="text-dim" style="text-align:center;padding:60px;">Listing not found.</p>`; return; }
      item.key = KEY;
      renderListing(user, item);
    });

    document.getElementById("bidCancel").addEventListener("click", closeBidModal);
    document.getElementById("bidModal").addEventListener("click", e => { if (e.target.id==="bidModal") closeBidModal(); });
    document.getElementById("bidConfirm").addEventListener("click", () => confirmBid(user));
    document.getElementById("buyoutConfirmBtn").addEventListener("click", () => confirmBuyout(user));
  }

  function renderListing(user, item) {
    document.title = `${item.title} — FishX`;
    const isAuction = item.type === "auction";
    const isEnded   = isAuction && item.endsAt && item.endsAt < Date.now();
    const isSold    = item.sold;
    const isMine    = item.sellerId === user.uid;
    const hasBuyout = isAuction && item.buyoutPrice > 0;
    const price     = isAuction ? (item.currentBid || item.startBid || 0) : (item.price || 0);

    const imgHtml = item.imageUrl
      ? `<img src="${item.imageUrl}" alt="${item.title}"/>`
      : `<div class="listing-img-placeholder">${item.emoji||"🐠"}</div>`;

    let actionHtml = "";
    if (isSold) {
      actionHtml = `<div style="text-align:center;padding:20px;background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);border-radius:var(--r-md);"><p style="color:var(--green);font-weight:700;font-size:1.1rem;">Sold</p><p style="font-size:0.85rem;color:var(--text-dim);margin-top:4px;">This listing has been sold</p></div>`;
    } else if (isMine) {
      actionHtml = `<div style="text-align:center;padding:20px;background:var(--blue-dim);border:1px solid var(--border-blue);border-radius:var(--r-md);"><p style="color:var(--blue-light);font-weight:700;">This is your listing</p></div>`;
    } else if (!isAuction) {
      actionHtml = `<button class="btn btn-primary btn-block" onclick="handleBuy('${KEY}')" style="font-size:1rem;padding:14px;">Buy Now for ${usd(price)}</button>`;
    } else if (!isEnded) {
      actionHtml = `
        <button class="btn btn-primary btn-block" onclick="openBidModal()" style="font-size:1rem;padding:14px;margin-bottom:10px;">Place Bid</button>
        ${hasBuyout ? `<button class="btn btn-outline btn-block" onclick="openBidModal(true)" style="border-color:var(--gold);color:var(--gold);font-size:0.95rem;padding:12px;">Buyout for ${usd(item.buyoutPrice)}</button>` : ""}
      `;
    } else {
      actionHtml = `<div style="text-align:center;padding:20px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:var(--r-md);"><p style="color:var(--red);font-weight:700;">Auction Ended</p></div>`;
    }

    document.getElementById("listingContent").innerHTML = `
      <div class="listing-hero">
        <div class="listing-img-wrap">${imgHtml}</div>
        <div class="listing-info">
          <div>
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;">
              ${item.grade ? `<span class="grade ${gradeClass(item.grade)}">${item.grade}</span>` : ""}
              <span style="font-size:0.72rem;font-weight:700;padding:4px 10px;border-radius:20px;${(isSold||isEnded)?'background:rgba(239,68,68,0.15);color:var(--red);border:1px solid rgba(239,68,68,0.3);':isAuction?'background:rgba(245,158,11,0.15);color:var(--gold);border:1px solid rgba(245,158,11,0.3);':'background:rgba(34,197,94,0.15);color:var(--green);border:1px solid rgba(34,197,94,0.3);'}">${(isSold||isEnded)?"SOLD":isAuction?"AUCTION":"BUY NOW"}</span>
            </div>
            <h1 class="listing-title">${item.title}</h1>
          </div>

          <a href="profile.html?uid=${item.sellerId}" class="listing-seller" style="text-decoration:none;cursor:pointer;transition:border-color 0.15s;" onmouseover="this.style.borderColor='var(--border-blue)'" onmouseout="this.style.borderColor=''">
            ${item.userPhoto ? `<img src="${item.userPhoto}" alt=""/>` : `<div style="width:36px;height:36px;border-radius:50%;background:var(--blue-dim);display:flex;align-items:center;justify-content:center;font-size:0.85rem;color:var(--blue-light);">F</div>`}
            <div>
              <p style="font-weight:600;font-size:0.9rem;color:var(--white);">${item.userName||"Anon Fisher"}</p>
              ${item.userLocation ? `<p style="font-size:0.78rem;color:var(--text-dim);">${item.userLocation}</p>` : ""}
            </div>
            <span style="margin-left:auto;font-size:0.75rem;color:var(--text-dim);">View profile ›</span>
          </a>

          <div class="price-box">
            <p class="price-label">${(isSold||isEnded) ? "Final Bid" : isAuction ? "Current Bid" : "Price"}</p>
            <p style="font-family:var(--font-display);font-size:2.5rem;font-weight:900;color:${(isSold||isEnded)?'var(--red)':'var(--green)'};">${usd(price)}</p>
            ${hasBuyout && !isSold && !isEnded ? `<p style="font-size:0.85rem;color:var(--gold);margin-top:6px;">Buyout: ${usd(item.buyoutPrice)}</p>` : ""}
            ${isAuction && item.endsAt && !isSold && !isEnded ? `<p style="font-size:0.82rem;color:var(--orange);margin-top:8px;" id="countdownTick">${countdown(item.endsAt)}</p>` : ""}
            ${(isSold||isEnded) ? `<p style="font-size:0.82rem;color:var(--red);margin-top:8px;">⏹ Auction ended</p>` : ""}
            ${isAuction && item.highBidderName ? `<p style="font-size:0.78rem;color:var(--text-dim);margin-top:6px;">${(isSold||isEnded)?"Winner":"Highest bidder"}: <strong style="color:var(--white);">${item.highBidderName}</strong></p>` : ""}
          </div>

          <div>${actionHtml}</div>

          ${item.rarity ? `<p style="font-size:0.82rem;color:var(--text-dim);">Rarity: ${item.rarity}</p>` : ""}
        </div>
      </div>

      ${item.description ? `
        <div style="margin-bottom:32px;">
          <h3 style="margin-bottom:12px;">About this Catch</h3>
          <p style="color:var(--text-muted);line-height:1.8;">${item.description}</p>
        </div>` : ""}

      ${item.species ? `
        <div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:32px;">
          <div style="padding:14px 20px;background:var(--gray-800);border-radius:var(--r-md);border:1px solid var(--border);">
            <p style="font-size:0.68rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-dim);margin-bottom:4px;">Species</p>
            <p style="font-weight:600;">${item.species}</p>
          </div>
          ${item.grade ? `<div style="padding:14px 20px;background:var(--gray-800);border-radius:var(--r-md);border:1px solid var(--border);">
            <p style="font-size:0.68rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-dim);margin-bottom:4px;">Grade</p>
            <span class="grade ${gradeClass(item.grade)}">${item.grade}</span>
          </div>` : ""}
        </div>` : ""}
    `;

    // Tick countdown only when auction is live
    if (isAuction && item.endsAt && !isEnded && !isSold) {
      const tickInterval = setInterval(() => {
        const el = document.getElementById("countdownTick");
        if (!el) { clearInterval(tickInterval); return; }
        const remaining = item.endsAt - Date.now();
        if (remaining <= 0) { el.textContent = "Auction ended"; clearInterval(tickInterval); return; }
        el.textContent = countdown(item.endsAt);
      }, 15000);
    }
  }

  function openBidModal(scrollToBuyout = false) {
    if (!item) return;
    document.getElementById("bidModalSub").textContent    = item.title;
    document.getElementById("bidModalCurrent").textContent = usd(item.currentBid || item.startBid || 0);
    document.getElementById("bidInput").value = "";
    const buyoutRow = document.getElementById("buyoutRow");
    if (item.buyoutPrice) {
      buyoutRow.style.display = "block";
      document.getElementById("buyoutAmountDisplay").textContent = usd(item.buyoutPrice);
    } else {
      buyoutRow.style.display = "none";
    }
    document.getElementById("bidModal").classList.remove("hidden");
  }
  function closeBidModal() { document.getElementById("bidModal").classList.add("hidden"); }

  async function confirmBid(user) {
    const bid = parseFloat(document.getElementById("bidInput").value);
    const min = (item.currentBid || item.startBid || 0) + 0.01;
    if (isNaN(bid) || bid < min) { toast(`Bid must be at least ${usd(min)}`, "error"); return; }
    if (item.sellerId === user.uid) { toast("You can't bid on your own listing!", "error"); return; }
    if (item.highBidder === user.uid) { toast("You're already the highest bidder — you can't outbid yourself!", "error"); return; }
    // If bid meets or exceeds buyout price, force a buyout instead
    if (item.buyoutPrice && bid >= item.buyoutPrice) {
      toast(`Your bid meets the buyout price. Use the Buyout button to purchase instantly.`, "error");
      return;
    }
    await db.ref(`listings/${KEY}`).update({ currentBid: bid, highBidder: user.uid, highBidderName: user.displayName });
    toast(`Bid of ${usd(bid)} placed!`, "success");
    closeBidModal();
  }

  async function confirmBuyout(user) {
    if (!item || !item.buyoutPrice) return;
    if (item.sellerId === user.uid) { toast("You can't buy your own listing!", "error"); return; }
    document.getElementById("bidConfirm").disabled = true;
    document.getElementById("buyoutConfirmBtn").disabled = true;
    await db.ref(`listings/${KEY}`).update({ sold: true, buyerId: user.uid, buyerName: user.displayName, soldAt: firebase.database.ServerValue.TIMESTAMP, currentBid: item.buyoutPrice });
    const convId = await createConversation(user);
    closeBidModal();
    showDMNotification(convId, "Buyout complete!");
  }

  async function handleBuy(key) {
    const user = auth.currentUser;
    if (item.sellerId === user.uid) { toast("You can't buy your own listing!", "error"); return; }
    await db.ref(`listings/${key}`).update({ sold: true, buyerId: user.uid, buyerName: user.displayName, soldAt: firebase.database.ServerValue.TIMESTAMP });
    const convId = await createConversation(user);
    showDMNotification(convId, "Purchase complete!");
  }

  async function createConversation(user) {
    const convId = [user.uid, item.sellerId].sort().join("_") + "_" + KEY;
    await db.ref(`conversations/${convId}`).update({
      listingKey: KEY, listingTitle: item.title,
      participants: { [user.uid]: true, [item.sellerId]: true },
      buyerId: user.uid, buyerName: user.displayName,
      sellerId: item.sellerId, sellerName: item.sellerName || item.userName,
      createdAt: firebase.database.ServerValue.TIMESTAMP,
      lastMessage: "Sale completed — start your conversation!",
      lastAt: firebase.database.ServerValue.TIMESTAMP,
      lastSenderId: null,
      [`readBy_${user.uid}`]: false,
      [`readBy_${item.sellerId}`]: false
    });
    return convId;
  }

  function showDMNotification(convId, headline) {
    // Full-screen overlay nudging user to the DM
    const overlay = document.createElement("div");
    overlay.style.cssText = "position:fixed;inset:0;z-index:9500;background:rgba(0,0,0,0.88);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn 0.3s;";
    overlay.innerHTML = `
      <div style="background:var(--gray-900);border:1px solid var(--border-blue);border-radius:var(--r-xl);padding:40px;width:100%;max-width:420px;text-align:center;box-shadow:var(--shadow-blue);animation:riseUp 0.4s var(--bounce);">
        <div style="font-size:3rem;margin-bottom:16px;">🎉</div>
        <h3 style="font-family:var(--font-display);font-size:1.8rem;font-weight:900;margin-bottom:10px;">${headline}</h3>
        <p style="color:var(--text-muted);font-size:0.92rem;margin-bottom:24px;line-height:1.6;">
          A direct message thread has been opened with the ${item.buyerId === auth.currentUser?.uid ? "seller" : "buyer"}.<br/>
          Head there now to coordinate the handoff!
        </p>
        <div style="display:flex;flex-direction:column;gap:10px;">
          <a href="messages.html?conv=${encodeURIComponent(convId)}" class="btn btn-primary btn-block" style="font-size:1rem;padding:14px;text-align:center;">
            💬 Open Conversation
          </a>
          <button class="btn btn-ghost btn-block" style="font-size:0.9rem;padding:12px;" onclick="this.closest('[style*=position\\:fixed]').remove()">
            Stay on listing
          </button>
        </div>
      </div>`;
    document.body.appendChild(overlay);
  }
</script>
</body>
</html>
