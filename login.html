<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Sign In — FishX</title>
  <link rel="stylesheet" href="css/global.css"/>
  <link rel="stylesheet" href="css/login.css"/>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
</head>
<body>
<div class="login-bg"><div class="login-grid"></div><div class="login-glow"></div></div>
<div class="login-wrap">
  <a href="index.html" class="login-logo">
    <img src="assets/logo.png" alt="FishX" style="height:48px;"/>
    <span>FishX</span>
  </a>
  <div class="login-card">
    <div class="login-card-header">
      <h2>SIGN IN</h2>
      <p class="text-muted">Join the premier fish marketplace</p>
    </div>
    <button class="btn-google" id="googleSignIn">
      <svg width="20" height="20" viewBox="0 0 48 48">
        <path fill="#FFC107" d="M43.6 20.2H42V20H24v8h11.3C33.7 32.7 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 7.9 2.9l5.7-5.7C34 6.5 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.6-.4-3.8z"/>
        <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 15.2 18.9 12 24 12c3.1 0 5.8 1.1 7.9 2.9l5.7-5.7C34 6.5 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/>
        <path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.3 35.3 26.8 36 24 36c-5.2 0-9.7-3.3-11.3-8H6.3C9.7 35.7 16.3 40 24 40z" transform="translate(0 4)"/>
        <path fill="#1976D2" d="M43.6 20.2H42V20H24v8h11.3c-.8 2.2-2.2 4.1-4 5.5l6.2 5.2C41.2 35.5 44 30.1 44 24c0-1.3-.1-2.6-.4-3.8z"/>
      </svg>
      Continue with Google
    </button>
    <div class="divider-text">or</div>
    <div class="login-info">
      <p class="text-dim" style="font-size:0.82rem;text-align:center;line-height:1.6;">
        FishX uses Google Sign-In to keep your account safe.<br/>No password required — just one click and you're on The Dock.
      </p>
    </div>
    <div class="login-footer">
      <a href="index.html" class="text-dim" style="font-size:0.82rem;">← Back to home</a>
    </div>
  </div>
  <p class="login-credits">Evan Fahey · Biruh Abaneh · Robert Gareev</p>
</div>
<div id="toastContainer"></div>
<script src="js/shared.js"></script>
<script>
  redirectIfAuthed("market.html");
  document.getElementById("googleSignIn").addEventListener("click", async () => {
    const provider = new firebase.auth.GoogleAuthProvider();
    try {
      const result = await auth.signInWithPopup(provider);
      const isNew = await upsertProfile(result.user);
      if (isNew) {
        showOnboardingModal(result.user, () => {
          setTimeout(() => window.location.href = "market.html", 600);
        });
      } else {
        toast("Welcome back to FishX!", "success");
        setTimeout(() => window.location.href = "market.html", 800);
      }
    } catch (err) {
      toast("Sign-in failed: " + err.message, "error");
    }
  });
</script>
</body>
</html>
