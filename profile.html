<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Profile — FishX</title>
  <link rel="stylesheet" href="css/global.css"/>
  <link rel="stylesheet" href="css/profile.css"/>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
</head>
<body>
<nav class="topnav">
  <a class="nav-logo" href="index.html">
    <img src="assets/logo.png" alt="FishX"/>
    <span class="nav-logo-text">FISH<span>X</span></span>
  </a>
  <div class="nav-links">
    <a class="nav-link" href="market.html">Market</a>
    <a class="nav-link" href="sell.html">Sell</a>
    <a class="nav-link" href="messages.html">Messages</a>
  </div>
  <div class="nav-right">
    <a href="profile.html" style="display:flex;align-items:center;gap:8px;text-decoration:none;">
      <img class="nav-avatar" id="navAvatar" src="" alt="avatar" style="display:none;"/>
      <span class="nav-username" id="navUsername"></span>
    </a>
    <button class="btn btn-ghost btn-sm" onclick="signOut()">Sign Out</button>
  </div>
</nav>

<div class="page-wrap">
  <div class="container">

    <!-- Back link when viewing someone else's profile -->
    <div id="backBar" style="display:none;margin-bottom:16px;">
      <a href="javascript:history.back()" style="color:var(--text-dim);font-size:0.85rem;display:inline-flex;align-items:center;gap:6px;">&#8592; Back</a>
    </div>

    <!-- Profile header -->
    <div class="profile-header">
      <div class="profile-avatar-wrap">
        <img class="profile-avatar" id="profileAvatar" src="assets/logo.png" alt="avatar"/>
        <div class="profile-avatar-ring"></div>
      </div>
      <div class="profile-info">
        <h2 id="profileName">—</h2>
        <p class="text-muted" id="profileEmail" style="font-size:0.85rem;"></p>
        <p style="font-size:0.82rem;color:var(--blue-light);margin-top:4px;" id="profileLocation"></p>

        <!-- Trust signals row -->
        <div id="trustRow" style="display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;"></div>
        <div class="profile-badges" id="profileBadges"></div>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;" id="headerActions">
        <!-- populated by JS depending on own vs other -->
      </div>
    </div>

    <!-- Trust card (extra info) -->
    <div id="trustCard" style="display:none;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px 28px;margin-bottom:24px;animation:riseUp 0.35s 0.07s var(--bounce) both;">
      <h4 style="font-size:0.78rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-dim);margin-bottom:14px;">Seller Info</h4>
      <div id="trustDetails" style="display:flex;flex-wrap:wrap;gap:20px;"></div>
    </div>

    <!-- Stats bar -->
    <div class="stats-bar">
      <div class="stat-item"><span class="stat-val" id="statListings">0</span><span class="stat-label">Listings</span></div>
      <div class="stat-div"></div>
      <div class="stat-item"><span class="stat-val" id="statSold">0</span><span class="stat-label">Sold</span></div>
      <div class="stat-div"></div>
      <div class="stat-item"><span class="stat-val" id="statActive">0</span><span class="stat-label">Active</span></div>
      <div class="stat-div"></div>
      <div class="stat-item"><span class="stat-val" id="statLikes">0</span><span class="stat-label">Likes</span></div>
      <div class="stat-div"></div>
      <div class="stat-item"><span class="stat-val" id="statMemberSince">—</span><span class="stat-label">Member Since</span></div>
    </div>

    <!-- Edit profile form (own profile only) -->
    <div class="edit-form hidden" id="editForm">
      <div class="edit-form-inner">
        <h3>Edit Profile</h3>
        <div class="form-group mt-4">
          <label class="form-label">Display Username</label>
          <input class="form-input" id="editUsername" type="text" placeholder="Your username" maxlength="32"/>
        </div>
        <div class="form-group">
          <label class="form-label">Location</label>
          <input class="form-input" id="editLocation" type="text" placeholder="City, State or Region" maxlength="60"/>
        </div>
        <div class="form-group">
          <label class="form-label">Favorite Fishing Spot</label>
          <input class="form-input" id="editSpot" type="text" placeholder="Your go-to fishing spot" maxlength="80"/>
        </div>
        <div class="form-group">
          <label class="form-label">Years Fishing</label>
          <select class="form-input" id="editYears">
            <option value="">Select…</option>
            <option>Under 1 year</option><option>1-3 years</option><option>3-5 years</option>
            <option>5-10 years</option><option>10+ years</option><option>20+ years</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Bio / About</label>
          <textarea class="form-input" id="editBio" rows="2" placeholder="Tell buyers a bit about yourself…" maxlength="200"></textarea>
        </div>
        <div style="display:flex;gap:10px;margin-top:4px;">
          <button class="btn btn-ghost" id="editCancel" style="flex:1;">Cancel</button>
          <button class="btn btn-primary" id="editSave" style="flex:2;">Save Changes</button>
        </div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="profile-tabs" id="profileTabs">
      <button class="ptab active" data-tab="listings">Listings</button>
      <button class="ptab" data-tab="messages" id="messagesTab" style="display:none;">Messages</button>
    </div>

    <div id="tabListings">
      <div class="grid-3" id="myListingsGrid">
        <div class="empty-state" style="grid-column:1/-1;"><div class="spinner" style="margin:0 auto 16px;"></div><p>Loading…</p></div>
      </div>
    </div>

    <div id="tabMessages" class="hidden">
      <div id="inlineMessages" style="max-width:800px;">
        <div style="display:flex;align-items:center;justify-content:center;padding:40px;"><div class="spinner"></div></div>
      </div>
    </div>

  </div>
</div>

<div id="toastContainer"></div>
<style>
/* Inline messages in profile tab */
.conv-row { display:flex;align-items:center;gap:14px;padding:16px;border:1px solid var(--border);border-radius:var(--r-lg);background:var(--gray-900);cursor:pointer;transition:all 0.18s;margin-bottom:10px; }
.conv-row:hover { border-color:var(--border-blue);background:var(--gray-800); }
.conv-row-icon { width:44px;height:44px;border-radius:50%;background:var(--blue-dim);display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0; }
.conv-row-body { flex:1;min-width:0; }
.conv-row-title { font-weight:600;font-size:0.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
.conv-row-preview { font-size:0.78rem;color:var(--text-dim);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
.conv-row-meta { font-size:0.7rem;color:var(--text-dim);flex-shrink:0; }
.trust-pill { display:inline-flex;align-items:center;gap:5px;font-size:0.72rem;font-weight:600;padding:4px 10px;border-radius:20px;border:1px solid var(--border); }
.trust-pill.green { background:rgba(34,197,94,0.1);border-color:rgba(34,197,94,0.3);color:#4ade80; }
.trust-pill.blue  { background:rgba(59,130,246,0.1);border-color:rgba(59,130,246,0.3);color:var(--blue-light); }
.trust-pill.gold  { background:rgba(245,158,11,0.1);border-color:rgba(245,158,11,0.3);color:var(--gold); }
.trust-pill.gray  { background:rgba(255,255,255,0.05);color:var(--text-dim); }
.trust-detail-item { display:flex;flex-direction:column;gap:2px; }
.trust-detail-label { font-size:0.65rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-dim); }
.trust-detail-value { font-size:0.88rem;font-weight:600;color:var(--white); }
</style>
<script src="js/shared.js"></script>
<script>
  const params  = new URLSearchParams(location.search);
  const viewUid = params.get("uid"); // null = own profile

  requireAuth(initProfile);

  function initProfile(currentUser) {
    const targetUid = viewUid || currentUser.uid;
    const isOwnProfile = targetUid === currentUser.uid;

    if (!isOwnProfile) {
      document.getElementById("backBar").style.display = "block";
    }

    // Load profile data
    db.ref(`users/${targetUid}`).once("value").then(snap => {
      const profile = snap.val() || {};
      const av = document.getElementById("profileAvatar");
      if (isOwnProfile && currentUser.photoURL) av.src = currentUser.photoURL;
      else if (profile.photoURL) av.src = profile.photoURL;

      document.getElementById("profileName").textContent     = profile.username || (isOwnProfile ? currentUser.displayName : "Anon Fisher") || "Anon Fisher";
      if (isOwnProfile) document.getElementById("profileEmail").textContent = currentUser.email || "";
      if (profile.location) document.getElementById("profileLocation").textContent = "📍 " + profile.location;

      // Member since
      if (profile.createdAt || snap.key) {
        // Use listing data for member since if available, else show year
        const ts = profile.createdAt;
        if (ts) {
          const d = new Date(ts);
          document.getElementById("statMemberSince").textContent = d.toLocaleDateString("en-US", { month: "short", year: "numeric" });
        }
      }

      // Trust pills
      const trustRow = document.getElementById("trustRow");
      if (profile.yearsExperience) {
        trustRow.innerHTML += `<span class="trust-pill blue">🎣 ${profile.yearsExperience} fishing</span>`;
      }
      if (profile.location) {
        trustRow.innerHTML += `<span class="trust-pill gray">📍 ${profile.location}</span>`;
      }
      if (profile.favSpot) {
        trustRow.innerHTML += `<span class="trust-pill gray">⚓ ${profile.favSpot}</span>`;
      }

      // Trust card — detailed seller info
      const trustDetails = document.getElementById("trustDetails");
      const trustCard = document.getElementById("trustCard");
      const details = [];

      if (profile.yearsExperience) details.push({ label: "Experience", value: profile.yearsExperience });
      if (profile.favSpot)         details.push({ label: "Favorite Spot", value: profile.favSpot });
      if (profile.bio)             details.push({ label: "About", value: profile.bio });

      if (details.length > 0 || !isOwnProfile) {
        trustCard.style.display = "block";
        details.forEach(d => {
          trustDetails.innerHTML += `<div class="trust-detail-item"><span class="trust-detail-label">${d.label}</span><span class="trust-detail-value">${d.value}</span></div>`;
        });
        if (!details.length) {
          trustDetails.innerHTML = `<p style="font-size:0.85rem;color:var(--text-dim);">No additional info provided.</p>`;
        }
      }

      // Header actions
      const headerActions = document.getElementById("headerActions");
      if (isOwnProfile) {
        headerActions.innerHTML = `
          <a href="messages.html" class="btn btn-outline btn-sm">Messages</a>
          <button class="btn btn-ghost btn-sm" id="editBtn">Edit Profile</button>`;
        setupEditForm(currentUser, profile);
      } else {
        // Viewing someone else's profile — show message button
        headerActions.innerHTML = `
          <a href="messages.html" class="btn btn-outline btn-sm">💬 Message</a>`;
      }
    });

    // Tabs — only show Messages tab on own profile
    if (isOwnProfile) {
      document.getElementById("messagesTab").style.display = "";
    }
    document.querySelectorAll(".ptab").forEach(tab => {
      tab.addEventListener("click", () => {
        document.querySelectorAll(".ptab").forEach(t => t.classList.remove("active"));
        tab.classList.add("active");
        const t = tab.dataset.tab;
        document.getElementById("tabListings").classList.toggle("hidden",  t !== "listings");
        document.getElementById("tabMessages").classList.toggle("hidden",  t !== "messages");
        if (t === "messages" && isOwnProfile) loadInlineMessages(currentUser);
      });
    });

    loadListings(targetUid, isOwnProfile, currentUser);
  }

  function setupEditForm(user, profile) {
    const editBtn  = document.getElementById("editBtn");
    const editForm = document.getElementById("editForm");
    if (!editBtn) return;
    editBtn.addEventListener("click", async () => {
      const snap = await db.ref(`users/${user.uid}`).once("value");
      const p = snap.val() || {};
      document.getElementById("editUsername").value = p.username || "";
      document.getElementById("editLocation").value = p.location || "";
      document.getElementById("editSpot").value     = p.favSpot  || "";
      document.getElementById("editBio").value      = p.bio      || "";
      // Set years select
      const yearsEl = document.getElementById("editYears");
      if (p.yearsExperience) {
        Array.from(yearsEl.options).forEach(o => { if (o.value === p.yearsExperience) o.selected = true; });
      }
      editForm.classList.toggle("hidden");
    });
    document.getElementById("editCancel").addEventListener("click", () => editForm.classList.add("hidden"));
    document.getElementById("editSave").addEventListener("click", async () => {
      const username = document.getElementById("editUsername").value.trim();
      const location = document.getElementById("editLocation").value.trim();
      const bio      = document.getElementById("editBio").value.trim();
      const years    = document.getElementById("editYears").value;
      if (!username) { toast("Username can't be empty", "error"); return; }
      await db.ref(`users/${user.uid}`).update({
        username, location,
        favSpot: document.getElementById("editSpot").value.trim() || null,
        yearsExperience: years || null,
        bio: bio || null
      });
      document.getElementById("profileName").textContent     = username;
      document.getElementById("profileLocation").textContent = location ? "📍 " + location : "";
      document.getElementById("navUsername").textContent     = username;
      editForm.classList.add("hidden");
      toast("Profile updated!", "success");
      // Refresh trust pills
      const trustRow = document.getElementById("trustRow");
      trustRow.innerHTML = "";
      if (years)    trustRow.innerHTML += `<span class="trust-pill blue">🎣 ${years} fishing</span>`;
      if (location) trustRow.innerHTML += `<span class="trust-pill gray">📍 ${location}</span>`;
      const spot = document.getElementById("editSpot").value.trim();
      if (spot)     trustRow.innerHTML += `<span class="trust-pill gray">⚓ ${spot}</span>`;
    });
  }

  function loadListings(targetUid, isOwnProfile, currentUser) {
    const grid = document.getElementById("myListingsGrid");
    db.ref("listings").orderByChild("sellerId").equalTo(targetUid).on("value", snap => {
      grid.innerHTML = "";
      const items = [];
      snap.forEach(c => items.push({ key: c.key, ...c.val() }));
      items.reverse();

      const sold   = items.filter(i => i.sold).length;
      const active = items.filter(i => !i.sold).length;
      const likes  = items.reduce((sum, i) => sum + Object.keys(i.likes || {}).length, 0);

      document.getElementById("statListings").textContent = items.length;
      document.getElementById("statSold").textContent     = sold;
      document.getElementById("statActive").textContent   = active;
      document.getElementById("statLikes").textContent    = likes;

      // Trust pill: sale rate
      if (items.length >= 3) {
        const rate = Math.round((sold / items.length) * 100);
        const trustRow = document.getElementById("trustRow");
        // Only add if not already there
        if (!trustRow.querySelector(".sale-rate-pill")) {
          const cls = rate >= 70 ? "green" : rate >= 40 ? "blue" : "gray";
          trustRow.innerHTML += `<span class="trust-pill ${cls} sale-rate-pill">✅ ${rate}% sale rate</span>`;
        }
      }

      // Member since — use earliest listing
      if (items.length) {
        const earliest = items.reduce((a, b) => (a.createdAt < b.createdAt ? a : b));
        if (earliest.createdAt) {
          const d = new Date(earliest.createdAt);
          document.getElementById("statMemberSince").textContent = d.toLocaleDateString("en-US", { month: "short", year: "numeric" });
        }
      }

      if (!items.length) {
        grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><span class="empty-state-icon">&#128246;</span><p>No listings yet.</p>${isOwnProfile ? '<a href="sell.html" class="btn btn-primary mt-4">List Your First Catch</a>' : ""}</div>`;
        return;
      }
      items.forEach((item, i) => {
        const card = buildFishCard(item.key, item, { showLike: !isOwnProfile });
        if (isOwnProfile) {
          const del = document.createElement("button");
          del.className = "btn btn-sm";
          del.style.cssText = "width:calc(100% - 32px);margin:4px 16px 16px;display:block;border:1px solid var(--border);color:var(--text-dim);background:transparent;";
          del.textContent = item.sold ? "Sold" : "Delete Listing";
          del.disabled = item.sold;
          if (!item.sold) {
            del.addEventListener("click", async e => {
              e.stopPropagation();
              if (confirm(`Delete "${item.title}"?`)) {
                await db.ref(`listings/${item.key}`).remove();
                toast("Listing removed.", "info");
              }
            });
          }
          card.appendChild(del);
        }
        card.style.animationDelay = `${i * 0.05}s`;
        grid.appendChild(card);
      });

      // Bind like buttons on public view
      if (!isOwnProfile && currentUser) {
        grid.querySelectorAll(".like-btn").forEach(btn => {
          btn.addEventListener("click", async () => {
            const key = btn.dataset.key;
            const liked = btn.classList.contains("liked");
            const ref = db.ref(`listings/${key}/likes/${currentUser.uid}`);
            if (liked) await ref.remove(); else await ref.set(true);
          });
        });
      }
    });
  }

  function loadInlineMessages(user) {
    const container = document.getElementById("inlineMessages");
    db.ref("conversations").orderByChild(`participants/${user.uid}`).equalTo(true).once("value").then(snap => {
      const convs = [];
      snap.forEach(c => convs.push({ id: c.key, ...c.val() }));
      convs.sort((a,b) => (b.lastAt||0)-(a.lastAt||0));
      if (!convs.length) {
        container.innerHTML = `<div style="text-align:center;padding:60px;color:var(--text-dim);"><div style="font-size:2.5rem;margin-bottom:12px;">&#128172;</div><p>No messages yet. Buy or sell to start chatting.</p></div>`;
        return;
      }
      container.innerHTML = `<p style="font-size:0.82rem;color:var(--text-dim);margin-bottom:16px;">${convs.length} conversation${convs.length>1?"s":""}</p>`;
      convs.forEach(conv => {
        const isMe = conv.buyerId === user.uid;
        const otherName = isMe ? (conv.sellerName||"Seller") : (conv.buyerName||"Buyer");
        const row = document.createElement("div");
        row.className = "conv-row";
        row.innerHTML = `
          <div class="conv-row-icon">&#128172;</div>
          <div class="conv-row-body">
            <div class="conv-row-title">${conv.listingTitle||"Listing"}</div>
            <div class="conv-row-preview">${conv.lastMessage||"…"}</div>
            <div style="font-size:0.72rem;color:var(--text-dim);margin-top:3px;">With: ${otherName} &middot; ${isMe?"You bought":"You sold"}</div>
          </div>
          <div class="conv-row-meta">${relTime(conv.lastAt||Date.now())}</div>
        `;
        row.addEventListener("click", () => window.location.href = `messages.html?conv=${conv.id}`);
        container.appendChild(row);
      });
    });
  }
</script>
</body>
</html>
